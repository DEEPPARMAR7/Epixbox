services:
  - type: web
    name: epixbox-api
    env: node
    region: ohio
    plan: free

    # Build Command - Install dependencies and build client
    buildCommand: npm install && npm run --prefix ../client build

    # Start Command
    startCommand: npm start

    # Root directory for the service
    rootDir: server

    # Environment Variables (will be prompted on first deploy)
    envVars:
      - key: NODE_ENV
        value: production

      - key: AUTO_MIGRATE
        value: "true"

      - key: PORT
        value: 4000

      - key: DATABASE_URL
        scope: secret
        # User must provide this

      - key: JWT_ACCESS_SECRET
        scope: secret
        # User must provide this - change it!

      - key: JWT_REFRESH_SECRET
        scope: secret
        # User must provide this - change it!

      - key: AWS_ACCESS_KEY_ID
        scope: secret
        # Optional - for S3 uploads

      - key: AWS_SECRET_ACCESS_KEY
        scope: secret
        # Optional

      - key: S3_BUCKET_NAME
        scope: secret
        # Optional

      - key: CORS_ORIGINS
        value: https://epixbox.vercel.app

      - key: FRONTEND_URL
        value: https://epixbox.vercel.app

      - key: CLIENT_URL
        value: https://epixbox.vercel.app

      - key: SMTP_HOST
        scope: secret
        # Optional - for email

      - key: SMTP_USER
        scope: secret
        # Optional

      - key: SMTP_PASS
        scope: secret
        # Optional

      - key: RAZORPAY_KEY_ID
        scope: secret
        # Required for Razorpay checkout creation

      - key: RAZORPAY_KEY_SECRET
        scope: secret
        # Required for Razorpay signature verification

      - key: RAZORPAY_WEBHOOK_SECRET
        scope: secret
        # Required for Razorpay webhook verification

      - key: PAYPAL_CLIENT_ID
        scope: secret
        # Optional - for PayPal checkout

      - key: PAYPAL_CLIENT_SECRET
        scope: secret
        # Optional - for PayPal checkout
